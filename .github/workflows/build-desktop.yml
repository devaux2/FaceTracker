name: Build desktop app

# Builds the Windows + macOS installers and publishes them (with the update
# metadata electron-updater needs) to GitHub Releases, so installed apps can
# auto-update. Each run gets a new version (1.0.<run number>).
on:
  push:
    branches: ["main"]
    paths-ignore: ["README.md", ".gitignore"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1 # serialize so both OS jobs publish to the same release safely
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version (1.0.<run number>)
        run: npm version "1.0.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm install

      - name: Bundle the face engine (offline)
        run: npm run vendor:mediapipe

      - name: Build & publish installer
        run: npx electron-builder --publish always
